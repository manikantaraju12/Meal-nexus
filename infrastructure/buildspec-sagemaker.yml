version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | head -c 8)
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t mealnexus-sagemaker-ranking:$IMAGE_TAG -f Dockerfile.sagemaker .
      - docker tag mealnexus-sagemaker-ranking:$IMAGE_TAG $SAGEMAKER_REPO_URI:$IMAGE_TAG
      - docker tag mealnexus-sagemaker-ranking:$IMAGE_TAG $SAGEMAKER_REPO_URI:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $SAGEMAKER_REPO_URI:$IMAGE_TAG
      - docker push $SAGEMAKER_REPO_URI:latest
      - echo "IMAGE_URI=$SAGEMAKER_REPO_URI:$IMAGE_TAG" > build-outputs.env

artifacts:
  files:
    - build-outputs.env
