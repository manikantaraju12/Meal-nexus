AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MealNexus AWS Infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. mealnexus.me). Leave empty to use ALB DNS directly."

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Route 53 hosted zone ID for DomainName. Must be pre-created before deploying."

  CertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN (us-east-1, must be ISSUED before deploying CloudFront)."

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # S3 Bucket
  MealNexusBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub mealnexus-${Environment}-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600

  # SQS Queue
  DonationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub mealnexus-donation-events-${Environment}
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DonationDLQ.Arn
        maxReceiveCount: 3

  DonationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub mealnexus-donation-events-dlq-${Environment}
      MessageRetentionPeriod: 1209600

  # SNS Topics
  NgoNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub mealnexus-ngo-notifications-${Environment}

  VolunteerNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub mealnexus-volunteer-notifications-${Environment}

  # Lambda AI Ranking Function
  AiRankingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub mealnexus-ai-ranking-${Environment}
      CodeUri: ../ai-service/lambda/
      Handler: lambda_ranking.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 512
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /rank
            Method: post
            RestApiId: !Ref AiApiGateway

  # API Gateway
  AiApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub mealnexus-ai-api-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # ECR Repositories
  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub mealnexus-backend-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub mealnexus-frontend-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  SageMakerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub mealnexus-sagemaker-ranking-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  # SageMaker Execution Role
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub mealnexus-sagemaker-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  # IAM Policy for ECS Backend to invoke SageMaker
  BackendSageMakerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub mealnexus-backend-sagemaker-policy-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sagemaker:InvokeEndpoint
            Resource:
              - !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/mealnexus-ranking-${Environment}
      Roles:
        - !Ref EcsTaskRole

  # ECS Cluster
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub mealnexus-${Environment}
      CapacityProviders:
        - FARGATE

  # IAM Role for ECS Execution
  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mealnexus/*

  # IAM Role for ECS Task
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MealNexusTaskPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt DonationQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref NgoNotificationTopic
                  - !Ref VolunteerNotificationTopic
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${MealNexusBucket}/*
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource:
                  - !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/mealnexus-ranking-${Environment}

  # VPC and Networking
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub mealnexus-vpc-${Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub mealnexus-igw-${Environment}

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub mealnexus-public-1-${Environment}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub mealnexus-public-2-${Environment}

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub mealnexus-rt-${Environment}

  Route:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # Security Groups
  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MealNexus backend
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub mealnexus-backend-sg-${Environment}

  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MealNexus frontend
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub mealnexus-frontend-sg-${Environment}

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub mealnexus-alb-sg-${Environment}

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub mealnexus-alb-${Environment}
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub mealnexus-alb-${Environment}

  AlbTargetGroupBackend:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub mealnexus-backend-tg-${Environment}
      Port: 5000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbTargetGroupFrontend:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub mealnexus-frontend-tg-${Environment}
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroupFrontend

  AlbApiPathRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroupBackend

  # ECS Task Definitions
  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub mealnexus-backend-${Environment}
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: 512
      Memory: 1024
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: node:20-alpine
          PortMappings:
            - ContainerPort: 5000
          Environment:
            - Name: NODE_ENV
              Value: !Ref Environment
            - Name: PORT
              Value: '5000'
            - Name: SQS_QUEUE_URL
              Value: !Ref DonationQueue
            - Name: SNS_NGO_TOPIC_ARN
              Value: !Ref NgoNotificationTopic
            - Name: SNS_VOLUNTEER_TOPIC_ARN
              Value: !Ref VolunteerNotificationTopic
            - Name: S3_BUCKET_NAME
              Value: !Ref MealNexusBucket
            - Name: USE_REAL_SMS
              Value: 'true'
            - Name: SAGEMAKER_ENDPOINT_NAME
              Value: !Sub mealnexus-ranking-${Environment}
            - Name: SAGEMAKER_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: MONGODB_URI
              ValueFrom: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mealnexus/${Environment}/MONGODB_URI
            - Name: JWT_SECRET
              ValueFrom: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mealnexus/${Environment}/JWT_SECRET
            - Name: FAST2SMS_API_KEY
              ValueFrom: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mealnexus/${Environment}/FAST2SMS_API_KEY
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend

  FrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub mealnexus-frontend-${Environment}
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: 256
      Memory: 512
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      ContainerDefinitions:
        - Name: frontend
          Image: nginx:alpine
          PortMappings:
            - ContainerPort: 80
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend

  # CloudWatch Log Groups
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /ecs/mealnexus-backend-${Environment}
      RetentionInDays: 30

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /ecs/mealnexus-frontend-${Environment}
      RetentionInDays: 30

  # ECS Services
  BackendService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: !Sub mealnexus-backend-${Environment}
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref BackendSecurityGroup
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 5000
          TargetGroupArn: !Ref AlbTargetGroupBackend
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: !Sub mealnexus-frontend-${Environment}
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref FrontendSecurityGroup
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 80
          TargetGroupArn: !Ref AlbTargetGroupFrontend
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

  # CloudFront CDN Distribution — HTTPS termination + edge caching
  # CertificateArn must be pre-created and ISSUED before deploying —
  # CloudFormation EarlyValidation requires the ACM cert to exist before changeset creation.
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasCustomDomain
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "MealNexus ${Environment} CDN"
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases:
          - !Ref DomainName
          - !Sub "www.${DomainName}"
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: AlbOrigin
            DomainName: !GetAtt ApplicationLoadBalancer.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        # /api/* — no caching, forward all headers and query strings to backend
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: AlbOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
        # Default — serves React frontend from nginx on ECS; no caching (SPA)
        DefaultCacheBehavior:
          TargetOriginId: AlbOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD

  # Route 53 A record: apex domain → CloudFront
  Route53RecordIPv4:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # Route 53 A record: www subdomain → CloudFront
  Route53WwwRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${AiApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/rank

  S3BucketName:
    Description: S3 bucket for assets
    Value: !Ref MealNexusBucket

  SQSQueueUrl:
    Description: SQS queue URL for donation events
    Value: !Ref DonationQueue

  NGOTopicArn:
    Description: SNS topic ARN for NGO notifications
    Value: !Ref NgoNotificationTopic

  VolunteerTopicArn:
    Description: SNS topic ARN for volunteer notifications
    Value: !Ref VolunteerNotificationTopic

  SageMakerRepositoryUri:
    Description: ECR URI for SageMaker ranking image
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${SageMakerRepository}

  SageMakerExecutionRoleArn:
    Description: IAM role ARN for SageMaker execution
    Value: !GetAtt SageMakerExecutionRole.Arn

  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  CloudFrontDomainName:
    Condition: HasCustomDomain
    Description: CloudFront distribution domain (d1234.cloudfront.net)
    Value: !GetAtt CloudFrontDistribution.DomainName

  CloudFrontURL:
    Condition: HasCustomDomain
    Description: HTTPS URL for the application via CloudFront
    Value: !Sub "https://${DomainName}"

  Route53HostedZoneId:
    Condition: HasCustomDomain
    Description: Route 53 hosted zone ID used for DNS records
    Value: !Ref HostedZoneId
